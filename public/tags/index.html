</a><script>
(function () {
  'use strict';

   
  var mq = window.matchMedia('(min-width: 1440px)');
  var postContent = document.querySelector('.post-content');
  if (!postContent) return;

  var allH = postContent.querySelectorAll('h2[id], h3[id], h4[id]');
  if (allH.length < 2) return;

   
  var tl = document.createElement('nav');
  tl.className = 'toc-timeline';
  tl.setAttribute('aria-label', 'Table of Contents');

  var area = document.createElement('div');
  area.className = 'toc-timeline-area';

  var line = document.createElement('div');
  line.className = 'toc-timeline-line';
  area.appendChild(line);

  var prog = document.createElement('div');
  prog.className = 'toc-timeline-progress';
  area.appendChild(prog);

   
  function getContentMetrics() {
    var r = postContent.getBoundingClientRect();
    return { top: r.top + window.scrollY, height: postContent.offsetHeight, right: r.right };
  }

   
  function headingText(h) {
    var clone = h.cloneNode(true);
    var anchor = clone.querySelector('.anchor');
    if (anchor) anchor.remove();
    return clone.textContent.trim();
  }

  var nodes  = [];
  var groups = [];    
  var cm = getContentMetrics();
  var MIN_GAP = 28;  

  allH.forEach(function (h) {
    var hTop = h.getBoundingClientRect().top + window.scrollY;
    var rel  = (hTop - cm.top) / cm.height;
    rel = Math.max(0, Math.min(1, rel));

    var isSub = h.tagName !== 'H2';

    var node = document.createElement('a');
    node.className = 'toc-timeline-node';
    if (isSub) {
      node.classList.add('sub');
      node.classList.add('toc-sub-collapsed'); 
    }
    node.href = '#' + h.id;
    node.style.top = (rel * 100) + '%';

    var dot = document.createElement('span');
    dot.className = 'toc-timeline-dot';

    var label = document.createElement('span');
    label.className = 'toc-timeline-label';
    label.textContent = headingText(h);

     
    node.appendChild(dot);
    node.appendChild(label);
    area.appendChild(node);

    node.addEventListener('click', function (e) {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    var nodeIdx = nodes.length;
    nodes.push({ el: h, node: node, rel: rel, isSub: isSub, groupIdx: -1, displayTop: rel });

     
    if (!isSub) {
      groups.push({ h2Idx: nodeIdx, children: [] });
      nodes[nodeIdx].groupIdx = groups.length - 1;
    } else if (groups.length > 0) {
      groups[groups.length - 1].children.push(nodeIdx);
      nodes[nodeIdx].groupIdx = groups.length - 1;
    }
  });

  tl.appendChild(area);
  document.body.appendChild(tl);

   
  var activeGroupIdx = -1;
  var hoverGroupIdx  = -1;

  function updateGroupVisibility() {
    groups.forEach(function (g, gIdx) {
      var expanded = (gIdx === activeGroupIdx || gIdx === hoverGroupIdx);
      g.children.forEach(function (childIdx) {
        if (expanded) {
          nodes[childIdx].node.classList.remove('toc-sub-collapsed');
        } else {
          nodes[childIdx].node.classList.add('toc-sub-collapsed');
        }
      });
    });
  }

   
  groups.forEach(function (g, gIdx) {
    var h2El = nodes[g.h2Idx].node;
    h2El.addEventListener('mouseenter', function () {
      hoverGroupIdx = gIdx;
      updateGroupVisibility();
      resolveCollisions();
    });
    h2El.addEventListener('mouseleave', function () {
      if (hoverGroupIdx === gIdx) {
        hoverGroupIdx = -1;
        updateGroupVisibility();
        resolveCollisions();
      }
    });
  });

   
  function resolveCollisions() {
    var areaH = area.offsetHeight;
    if (areaH <= 0) return;

     
    var vis = [];
    nodes.forEach(function (n, idx) {
      if (n.isSub && n.node.classList.contains('toc-sub-collapsed')) return;
      vis.push({ idx: idx, topPx: n.displayTop * areaH });
    });
    if (vis.length < 2) return;
    vis.sort(function (a, b) { return a.topPx - b.topPx; });

     
    for (var i = 1; i < vis.length; i++) {
      if (vis[i].topPx - vis[i - 1].topPx < MIN_GAP) {
        vis[i].topPx = vis[i - 1].topPx + MIN_GAP;
      }
    }

     
    var maxPx = areaH;
    for (var i = vis.length - 1; i >= 0; i--) {
      if (vis[i].topPx > maxPx) vis[i].topPx = maxPx;
      maxPx = vis[i].topPx - MIN_GAP;
    }

     
    vis.forEach(function (v) {
      nodes[v.idx].node.style.top = (v.topPx / areaH * 100) + '%';
    });
  }

   
  function updateTimelinePosition() {
    var rect = postContent.getBoundingClientRect();
    tl.style.left = (rect.right + 24) + 'px';
  }

   
  var isScrolled = false;
  var activeIdx  = -1;

  function onScroll() {
    var sy = window.scrollY;
    var vh = window.innerHeight;
    var c  = getContentMetrics();
    var cBottom = c.top + c.height;

     
    var visible = sy + vh > c.top + 60 && sy < cBottom - 60;
    tl.classList.toggle('visible', visible);
    if (!visible) return;

     
    var sliderH = Math.min((vh / c.height) / 3, 0.5);
    var halfS   = sliderH / 2;

     
    nodes.forEach(function (n) {
      var hTop = n.el.getBoundingClientRect().top + sy;
      n.rel = Math.max(0, Math.min(1, (hTop - c.top) / c.height));
      n.displayTop = halfS + n.rel * (1 - sliderH);
      n.node.style.top = (n.displayTop * 100) + '%';
    });

     
    var nowScrolled = sy > c.top + 120;
    if (nowScrolled !== isScrolled) {
      isScrolled = nowScrolled;
      tl.classList.toggle('scrolled', isScrolled);
    }

     
    var newIdx = -1;
    for (var i = nodes.length - 1; i >= 0; i--) {
      if (nodes[i].el.getBoundingClientRect().top <= vh * 0.25) {
        newIdx = i;
        break;
      }
    }
    if (newIdx !== activeIdx) {
      if (activeIdx >= 0) nodes[activeIdx].node.classList.remove('active');
      if (newIdx >= 0)     nodes[newIdx].node.classList.add('active');
      activeIdx = newIdx;
    }

     
    var newGroupIdx = -1;
    if (newIdx >= 0) newGroupIdx = nodes[newIdx].groupIdx;
    if (newGroupIdx !== activeGroupIdx) {
      activeGroupIdx = newGroupIdx;
      updateGroupVisibility();
    }

     
    resolveCollisions();

     
    var sliderCenter;
    if (newIdx < 0) {
      sliderCenter = halfS + nodes[0].rel * (1 - sliderH);
    } else {
      var curDisplay = halfS + nodes[newIdx].rel * (1 - sliderH);
      var nextDisplay;
      if (newIdx + 1 < nodes.length) {
        nextDisplay = halfS + nodes[newIdx + 1].rel * (1 - sliderH);
      } else {
        nextDisplay = 1 - halfS;
      }
      var curAbs  = nodes[newIdx].el.getBoundingClientRect().top + sy;
      var nextAbs = (newIdx + 1 < nodes.length)
        ? nodes[newIdx + 1].el.getBoundingClientRect().top + sy
        : c.top + c.height;
      var sectionLen  = nextAbs - curAbs;
      var scrolledPast = Math.max(0, sy - curAbs);
      var t = sectionLen > 0 ? Math.max(0, Math.min(1, scrolledPast / sectionLen)) : 0;
      sliderCenter = curDisplay + t * (nextDisplay - curDisplay);
    }
    var sliderTop = sliderCenter - halfS;
    sliderTop = Math.max(0, Math.min(1 - sliderH, sliderTop));
    prog.style.top    = (sliderTop * 100) + '%';
    prog.style.height = (sliderH * 100) + '%';
  }

   
  function checkMQ() {
    tl.style.display = mq.matches ? '' : 'none';
    if (mq.matches) updateTimelinePosition();
  }
  mq.addEventListener('change', checkMQ);
  checkMQ();

  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', function () {
    updateTimelinePosition();
    onScroll();
  });

   
  requestAnimationFrame(function () {
    updateTimelinePosition();
    onScroll();
  });
})();
</script>

<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var mybutton = document.getElementById("top-link");
    window.onscroll = function () {
        if (document.body.scrollTop > 800 || document.documentElement.scrollTop > 800) {
            mybutton.style.visibility = "visible";
            mybutton.style.opacity = "1";
        } else {
            mybutton.style.visibility = "hidden";
            mybutton.style.opacity = "0";
        }
    };

</script>
