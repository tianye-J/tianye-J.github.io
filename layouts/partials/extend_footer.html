{{- /* Right-side timeline TOC — list-based layout, no collision detection */ -}}
{{- if (.Param "ShowToc") -}}
<script>
(function () {
  'use strict';

  /* ── Guards ── */
  var mq = window.matchMedia('(min-width: 1440px)');
  var postContent = document.querySelector('.post-content');
  if (!postContent) return;

  var allH = postContent.querySelectorAll('h2[id], h3[id], h4[id]');
  if (allH.length < 2) return;

  /* ── Extract heading plain text (strip PaperMod anchor #) ── */
  function headingText(h) {
    var clone = h.cloneNode(true);
    var anchor = clone.querySelector('.anchor');
    if (anchor) anchor.remove();
    return clone.textContent.trim();
  }

  /* ── Build DOM — nested ul/li structure ── */
  var tl = document.createElement('nav');
  tl.className = 'toc-timeline';
  tl.setAttribute('aria-label', 'Table of Contents');

  var list = document.createElement('ul');
  list.className = 'toc-tl-list';

  var prog = document.createElement('div');
  prog.className = 'toc-tl-progress';
  list.appendChild(prog);

  var items = [];       // { el: heading, li: li element, isSub: bool, parentIdx: number }
  var currentH2Idx = -1;
  var currentChildren = null;

  allH.forEach(function (h) {
    var isSub = h.tagName !== 'H2';

    var li = document.createElement('li');
    li.className = 'toc-tl-item' + (isSub ? ' sub' : '');

    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.addEventListener('click', function (e) {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    var dot = document.createElement('span');
    dot.className = 'toc-tl-dot';

    var label = document.createElement('span');
    label.className = 'toc-tl-label';
    label.textContent = headingText(h);

    a.appendChild(dot);
    a.appendChild(label);
    li.appendChild(a);

    var idx = items.length;

    if (!isSub) {
      /* h2: append to main list, create children container */
      currentChildren = document.createElement('ul');
      currentChildren.className = 'toc-tl-children';
      li.appendChild(currentChildren);
      list.appendChild(li);
      currentH2Idx = idx;
      items.push({ el: h, li: li, isSub: false, parentIdx: -1 });
    } else {
      /* h3/h4: append to current h2's children */
      if (currentChildren) {
        currentChildren.appendChild(li);
      } else {
        list.appendChild(li);
      }
      items.push({ el: h, li: li, isSub: true, parentIdx: currentH2Idx });
    }
  });

  tl.appendChild(list);
  document.body.appendChild(tl);

  /* ── Scroll handler ── */
  var isScrolled = false;
  var activeIdx = -1;
  var expandedH2 = null;
  var contentTop = 0;
  var contentHeight = 1;

  function refreshMetrics() {
    var r = postContent.getBoundingClientRect();
    contentTop = r.top + window.scrollY;
    contentHeight = Math.max(postContent.offsetHeight, 1);
  }

  function onScroll() {
    var sy = window.scrollY;
    var vh = window.innerHeight;

    /* Refresh content position (cheap: one getBoundingClientRect) */
    refreshMetrics();
    var cBottom = contentTop + contentHeight;

    /* Show/hide timeline based on content visibility */
    var visible = sy + vh > contentTop + 60 && sy < cBottom - 60;
    tl.classList.toggle('visible', visible);
    if (!visible) return;

    /* Scrolled state */
    var nowScrolled = sy > contentTop + 120;
    if (nowScrolled !== isScrolled) {
      isScrolled = nowScrolled;
      tl.classList.toggle('scrolled', isScrolled);
    }

    /* Find active heading */
    var newIdx = -1;
    for (var i = items.length - 1; i >= 0; i--) {
      if (items[i].el.getBoundingClientRect().top <= vh * 0.25) {
        newIdx = i;
        break;
      }
    }

    if (newIdx !== activeIdx) {
      /* Remove old active */
      if (activeIdx >= 0) items[activeIdx].li.classList.remove('active');
      /* Set new active */
      if (newIdx >= 0) items[newIdx].li.classList.add('active');
      activeIdx = newIdx;

      /* Expand active h2's children, collapse others */
      var newH2 = null;
      if (newIdx >= 0) {
        newH2 = items[newIdx].isSub
          ? (items[newIdx].parentIdx >= 0 ? items[items[newIdx].parentIdx].li : null)
          : items[newIdx].li;
      }
      if (newH2 !== expandedH2) {
        if (expandedH2) expandedH2.classList.remove('expanded');
        if (newH2) newH2.classList.add('expanded');
        expandedH2 = newH2;
      }
    }

    /* Update progress indicator position */
    if (newIdx >= 0) {
      var itemEl = items[newIdx].li;
      var linkEl = itemEl.querySelector('a');
      var dotTop = linkEl.offsetTop + linkEl.offsetHeight / 2;
      prog.style.top = (dotTop - 10) + 'px';
      prog.style.height = '20px';
    }
  }

  /* ── Responsive show/hide ── */
  function checkMQ() {
    tl.style.display = mq.matches ? '' : 'none';
  }
  mq.addEventListener('change', checkMQ);
  checkMQ();

  window.addEventListener('scroll', onScroll, { passive: true });

  /* Initial render */
  requestAnimationFrame(onScroll);
})();
</script>
{{- end -}}

{{- /* Code block language labels */ -}}
<script>
(function () {
  var langMap = {
    py: 'Python', python: 'Python', js: 'JavaScript', javascript: 'JavaScript',
    ts: 'TypeScript', typescript: 'TypeScript', go: 'Go', rust: 'Rust',
    java: 'Java', cpp: 'C++', c: 'C', cs: 'C#', rb: 'Ruby', ruby: 'Ruby',
    sh: 'Shell', bash: 'Bash', zsh: 'Zsh', html: 'HTML', css: 'CSS',
    json: 'JSON', yaml: 'YAML', yml: 'YAML', toml: 'TOML', xml: 'XML',
    sql: 'SQL', md: 'Markdown', markdown: 'Markdown', tex: 'LaTeX',
    latex: 'LaTeX', r: 'R', lua: 'Lua', swift: 'Swift', kotlin: 'Kotlin',
    dart: 'Dart', php: 'PHP', dockerfile: 'Dockerfile', makefile: 'Makefile'
  };
  document.querySelectorAll('.highlight code[class*="language-"]').forEach(function (code) {
    var match = code.className.match(/language-(\w+)/);
    if (!match) return;
    var lang = match[1].toLowerCase();
    var display = langMap[lang] || lang.toUpperCase();
    var label = document.createElement('span');
    label.className = 'code-lang-label';
    label.textContent = display;
    var highlight = code.closest('.highlight');
    if (highlight) highlight.appendChild(label);
  });
})();
</script>

{{- /* Typewriter entrance effect — homepage only */ -}}
{{- if .IsHome -}}
<script>
(function () {
  'use strict';

  // Homepage only, no effect on other pages
  var h1 = document.querySelector('.home-info .entry-header h1');
  if (!h1) return;

  // Respect reduced-motion preference
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  // Read original text, clear h1 content
  var fullText = h1.innerText || h1.textContent || '';
  h1.textContent = '';

  // Insert blinking cursor
  var cursor = document.createElement('span');
  cursor.className = 'typewriter-cursor';
  cursor.setAttribute('aria-hidden', 'true');
  cursor.textContent = '|';
  h1.appendChild(cursor);

  // Delay to coordinate with hero-pop animation
  // hero-pop: 0.12s delay + ~0.5s pop complete ≈ 0.62s before typing starts
  var i = 0;
  setTimeout(function () {
    var interval = setInterval(function () {
      if (i < fullText.length) {
        // Insert characters one by one before the cursor
        h1.insertBefore(document.createTextNode(fullText[i]), cursor);
        i++;
      } else {
        clearInterval(interval);
        // Typing done: fade out cursor after 1s
        setTimeout(function () {
          cursor.style.transition = 'opacity 0.5s ease';
          cursor.style.opacity = '0';
          cursor.style.animation = 'none';
        }, 1000);
        setTimeout(function () {
          if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
        }, 1550);
      }
    }, 78); // ~78ms per char, "Arden J" takes ~0.55s
  }, 620);
})();
</script>
{{- end -}}
