<svg viewBox="0 0 340 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- === Arden J · About Portrait — Chill College Guy ===
       Lounging pose: leaning back with legs kicked up on a stack of books,
       one hand behind head, the other holding a coffee mug. Quirky & relaxed. -->

  <!-- ==================== BOOKS STACK (right side) ==================== -->
  <rect x="218" y="148" width="62" height="14" rx="2"
        stroke="#3D3733" stroke-width="3" stroke-linejoin="round"/>
  <rect x="222" y="136" width="56" height="14" rx="2"
        stroke="#3D3733" stroke-width="3" stroke-linejoin="round"/>
  <rect x="226" y="122" width="46" height="14" rx="2"
        stroke="#3D3733" stroke-width="2.8" stroke-linejoin="round"
        transform="rotate(-4, 249, 129)"/>

  <!-- ==================== BODY — reclined, leaning back ==================== -->
  <path d="M120 120
           C116 130, 112 144, 110 158
           C108 168, 108 176, 110 182"
        stroke="#3D3733" stroke-width="3.8" stroke-linecap="round" fill="none"/>
  <path d="M88 108
           C84 118, 78 138, 76 156
           C74 168, 76 178, 80 184"
        stroke="#3D3733" stroke-width="3.8" stroke-linecap="round" fill="none"/>
  <!-- Hoodie bottom -->
  <path d="M80 184 C88 190, 100 192, 110 182"
        stroke="#3D3733" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <!-- Hoodie neckline -->
  <path d="M94 112 C98 118, 104 120, 108 118"
        stroke="#3D3733" stroke-width="2.8" stroke-linecap="round" fill="none"/>

  <!-- ==================== HEAD — tilted back ==================== -->
  <path d="M96 56
           C110 52, 126 56, 130 68
           C134 80, 132 94, 126 104
           C120 112, 110 116, 100 116
           C90 116, 82 110, 78 100
           C74 90, 74 76, 78 66
           C82 56, 90 54, 96 56Z"
        stroke="#3D3733" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Hair — messy, tousled -->
  <path d="M82 66 C84 46, 94 38, 104 36 C116 34, 130 40, 134 56"
        stroke="#3D3733" stroke-width="4.2" stroke-linecap="round" fill="none"/>
  <path d="M86 58 C90 44, 100 38, 108 38"
        stroke="#3D3733" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M118 38 C126 42, 132 50, 132 58"
        stroke="#3D3733" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <!-- Rebel tuft -->
  <path d="M108 38 C112 28, 118 24, 116 32"
        stroke="#3D3733" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Glasses -->
  <circle cx="92" cy="80" r="11" stroke="#3D3733" stroke-width="2.6"/>
  <circle cx="118" cy="78" r="11" stroke="#3D3733" stroke-width="2.6"/>
  <path d="M103 78 C106 75, 108 75, 107 78" stroke="#3D3733" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M81 79 C76 78, 74 76, 76 74" stroke="#3D3733" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Eyes — looking upward, daydreaming -->
  <circle cx="92" cy="78" r="2.5" fill="#3D3733"/>
  <circle cx="118" cy="76" r="2.5" fill="#3D3733"/>

  <!-- Eyebrows — one raised -->
  <path d="M82 66 C86 63, 94 62, 100 64"
        stroke="#3D3733" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M110 61 C116 58, 124 58, 128 62"
        stroke="#3D3733" stroke-width="2.8" stroke-linecap="round" fill="none"/>

  <!-- Mouth — lopsided grin -->
  <path d="M96 96 C100 100, 110 102, 116 98"
        stroke="#3D3733" stroke-width="2.8" stroke-linecap="round" fill="none"/>

  <!-- Neck -->
  <path d="M94 114 C92 118, 90 112, 88 108"
        stroke="#3D3733" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <path d="M108 116 C112 118, 118 118, 120 120"
        stroke="#3D3733" stroke-width="3.2" stroke-linecap="round" fill="none"/>

  <!-- ==================== LEFT ARM — behind head ==================== -->
  <path d="M88 108 C80 100, 70 90, 66 80"
        stroke="#3D3733" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M66 80 C62 76, 68 68, 76 66"
        stroke="#3D3733" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <path d="M76 66 C80 62, 82 60, 84 58"
        stroke="#3D3733" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M76 66 C78 60, 76 56, 74 54"
        stroke="#3D3733" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- ==================== RIGHT ARM — holding coffee ==================== -->
  <path d="M120 120 C130 130, 140 140, 148 148"
        stroke="#3D3733" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M148 148 C152 144, 156 140, 158 136"
        stroke="#3D3733" stroke-width="3.2" stroke-linecap="round" fill="none"/>

  <!-- Coffee mug -->
  <path d="M150 126 L150 144 C150 150, 166 150, 166 144 L166 126 Z"
        stroke="#3D3733" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M166 130 C174 130, 176 140, 166 142"
        stroke="#3D3733" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Steam -->
  <path d="M154 122 C152 116, 156 112, 154 106"
        stroke="#3D3733" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M160 120 C162 114, 158 110, 160 104"
        stroke="#3D3733" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- ==================== LEGS — feet up on books ==================== -->
  <path d="M90 182 C100 192, 120 198, 148 200
           C168 202, 196 200, 218 194"
        stroke="#3D3733" stroke-width="3.8" stroke-linecap="round" fill="none"/>
  <path d="M100 178 C112 186, 136 192, 162 192
           C182 192, 204 188, 224 180"
        stroke="#3D3733" stroke-width="3.8" stroke-linecap="round" fill="none"/>

  <!-- Sneakers -->
  <path d="M218 194 C224 192, 232 190, 238 192 C242 194, 240 200, 234 200 C228 200, 220 198, 218 194Z"
        stroke="#3D3733" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M224 180 C230 177, 238 176, 244 178 C248 180, 246 186, 240 186 C234 186, 226 184, 224 180Z"
        stroke="#3D3733" stroke-width="2.8" stroke-linecap="round" fill="none"/>

  <!-- ==================== ACCENTS ==================== -->
  <!-- Sparkle near coffee -->
  <path d="M180 108 L182 102 L184 108 L190 106 L184 110 L186 116 L182 112 L176 114 L180 108Z"
        fill="#C8795A" opacity="0.55"/>

  <!-- Sleepy "z"s floating up -->
  <text x="60" y="48" font-family="'Noto Serif', serif" font-size="14" font-weight="700"
        fill="#C8795A" opacity="0.45" transform="rotate(-12, 60, 48)">z</text>
  <text x="48" y="38" font-family="'Noto Serif', serif" font-size="10" font-weight="700"
        fill="#C8795A" opacity="0.35" transform="rotate(-8, 48, 38)">z</text>

  <!-- Subtle blush -->
  <circle cx="86" cy="96" r="5" fill="#C8795A" opacity="0.12"/>
  <circle cx="122" cy="94" r="5" fill="#C8795A" opacity="0.12"/>
</svg>
