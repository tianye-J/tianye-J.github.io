baseURL = "https://ardenj.pages.dev/"
languageCode = "zh-cn"
title = "Arden’s blog"
theme = "PaperMod"

[pagination]
  pagerSize = 8

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  series = "series"

[params]
  env = "production"
  defaultTheme = "light"
  disableThemeToggle = true
  disableScrollToTop = false
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = true
  UseHugoToc = true
  comments = true
  description = "Arden’s blog — Robotics, foundation models, post-training, and AI infrastructure"

  [params.homeInfoParams]
    Title = "Hello, I’m **Arden**"
    Content = "Robotics Engineering @ NJUPT · Foundation models, post-training, and AI infrastructure"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/tianye-J"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    hiddenInList = false
    hiddenInSingle = true

  [params.label]
    text = "Arden's blog"
    icon = "/images/logo-swirl.png"
    iconHeight = 28

  [params.footer]
    hideCopyright = false
    text = "*南方，某扇房门，某个街角* — 博尔赫斯"

  [params.fuseOpts]
    isCaseSensitive = false
    includeMatches = true
    includeScore = true
    shouldSort = true
    findAllMatches = true
    location = 0
    distance = 1000
    threshold = 0.36
    minMatchCharLength = 1
    ignoreLocation = true
    limit = 24
keys = [
  { name = "title", weight = 0.30 },
  { name = "tags", weight = 0.22 },
  { name = "description", weight = 0.16 },
  { name = "series", weight = 0.10 },
  { name = "stack", weight = 0.08 },
  { name = "status", weight = 0.06 },
  { name = "outcome", weight = 0.04 },
  { name = "summary", weight = 0.04 },
  { name = "content", weight = 0.03 }
]

[[menu.main]]
  identifier = "learning"
  name = "LEARNING"
  url = "/learning/"
  weight = 10

[[menu.main]]
  identifier = "projects"
  name = "PROJECTS"
  url = "/projects/"
  weight = 20

[[menu.main]]
  identifier = "thinking"
  name = "THINKING"
  url = "/thinking/"
  weight = 30

[[menu.main]]
  identifier = "about"
  name = "ABOUT"
  url = "/about/"
  weight = 40

[[menu.main]]
  identifier = "friends"
  name = "FRIENDS"
  url = "/friends/"
  weight = 45

[[menu.main]]
  identifier = "search"
  name = "SEARCH"
  url = "/search/"
  weight = 50

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    lineNumbersInTable = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [["$$", "$$"]]
      inline = [["$", "$"]]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
