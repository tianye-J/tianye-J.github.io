<svg viewBox="0 0 400 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- === Arden J · Home Illustration ===
       Abstract engineering doodle: geometric shapes + flowing curves + circuit nodes
       Style: warm hand-drawn, notebook sketch feel -->

  <!-- Flowing background curves — movement & warmth -->
  <path d="M12 105 C55 82, 90 42, 148 62 S218 112, 268 72 S348 28, 388 52"
        stroke="#C8795A" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
  <path d="M28 125 C78 92, 118 68, 168 82 S248 128, 298 88 S368 42, 392 62"
        stroke="#7A8F6E" stroke-width="1.3" stroke-linecap="round" opacity="0.22"/>

  <!-- Rotated square — foundation / building -->
  <rect x="68" y="28" width="28" height="28" rx="2.5"
        stroke="#3D3733" stroke-width="2" transform="rotate(18, 82, 42)"/>
  <circle cx="82" cy="42" r="2.5" fill="#C8795A" opacity="0.7"/>

  <!-- Circle — precision / completeness -->
  <circle cx="155" cy="56" r="22" stroke="#3D3733" stroke-width="2.2"/>
  <circle cx="155" cy="56" r="3.8" fill="#C8795A"/>

  <!-- Triangle — direction / aspiration -->
  <polygon points="262,32 284,72 240,72"
           stroke="#3D3733" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Gear — engineering / robotics -->
  <circle cx="345" cy="48" r="16" stroke="#3D3733" stroke-width="2"/>
  <circle cx="345" cy="48" r="8" stroke="#3D3733" stroke-width="1.5"/>
  <line x1="345" y1="32" x2="345" y2="27" stroke="#3D3733" stroke-width="3" stroke-linecap="round"/>
  <line x1="359" y1="40" x2="363" y2="37" stroke="#3D3733" stroke-width="3" stroke-linecap="round"/>
  <line x1="361" y1="56" x2="365" y2="59" stroke="#3D3733" stroke-width="3" stroke-linecap="round"/>
  <line x1="345" y1="64" x2="345" y2="69" stroke="#3D3733" stroke-width="3" stroke-linecap="round"/>
  <line x1="331" y1="56" x2="327" y2="59" stroke="#3D3733" stroke-width="3" stroke-linecap="round"/>
  <line x1="329" y1="40" x2="325" y2="37" stroke="#3D3733" stroke-width="3" stroke-linecap="round"/>

  <!-- Connecting dashed lines — circuit / data flow -->
  <line x1="96" y1="44" x2="133" y2="50"
        stroke="#7A8F6E" stroke-width="1.2" stroke-linecap="round" opacity="0.4" stroke-dasharray="3,4"/>
  <line x1="177" y1="56" x2="240" y2="58"
        stroke="#7A8F6E" stroke-width="1.2" stroke-linecap="round" opacity="0.4" stroke-dasharray="4,5"/>
  <line x1="284" y1="52" x2="329" y2="48"
        stroke="#7A8F6E" stroke-width="1.2" stroke-linecap="round" opacity="0.4" stroke-dasharray="3,4"/>

  <!-- Accent dots — scattered circuit nodes -->
  <circle cx="38" cy="98" r="3" fill="#C8795A" opacity="0.45"/>
  <circle cx="205" cy="38" r="2.5" fill="#7A8F6E" opacity="0.4"/>
  <circle cx="120" cy="88" r="2.5" fill="#7A8F6E" opacity="0.3"/>
  <circle cx="310" cy="82" r="2.2" fill="#C8795A" opacity="0.38"/>
  <circle cx="378" cy="72" r="2.5" fill="#C8795A" opacity="0.42"/>
  <circle cx="58" cy="68" r="2" fill="#7A8F6E" opacity="0.28"/>
</svg>
