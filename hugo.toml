baseURL = 'https://ardenj.pages.dev/'
languageCode = 'zh-cn'
title = "Arden's blog"
theme = 'PaperMod'

[pagination]
  pagerSize = 8

[params]
  env = 'production'
  defaultTheme = 'light'
  disableThemeToggle = true
  disableScrollToTop = false
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = false
  ShowToc = true
  TocOpen = true
  UseHugoToc = true
  description = "Robotics · AI · Engineering"

  [params.homeInfoParams]
    Title = "Hello, I'm **Arden**"
    Content = "Robotics Engineering @ NJUPT · Exploring AI & Autonomous Systems"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/tianye-J"

  [params.cover]
    hiddenInList = false
    hiddenInSingle = true

  [params.label]
    text = "Arden's blog"
    icon = '/images/logo.png'
    iconHeight = 28

  [params.footer]
    hideCopyright = false
    text = '*南方，某扇房门，某个街角* — 博尔赫斯'

# ---------- Navigation ----------

[[menu.main]]
  identifier = "projects"
  name = "Projects"
  url = "/projects/"
  weight = 20

[[menu.main]]
  identifier = "Thinking"
  name = "Thinking"
  url = "/Thinking/"
  weight = 30

[[menu.main]]
  identifier = "learning"
  name = "Learning"
  url = "/learning/"
  weight = 10

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 40

# ---------- Markup ----------

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [['$$', '$$']]
      inline = [['$', '$']]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
